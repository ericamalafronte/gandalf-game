<!DOCTYPE html>
<html>
<head>
    <title>Gandalf's Challenge</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0c29; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        #wizard-img { width: 180px; height: 180px; border-radius: 50%; border: 4px solid #00d2ff; margin-bottom: 20px; background: #16213e; transition: transform 0.3s ease; }
        #chat { background: rgba(255, 255, 255, 0.05); border-radius: 10px; height: 400px; overflow-y: auto; padding: 15px; text-align: left; border: 1px solid #333; margin-bottom: 10px; scroll-behavior: smooth; }
        .msg { margin-bottom: 12px; padding: 10px; border-radius: 8px; line-height: 1.4; animation: fadeIn 0.3s ease; }
        .user { background: #243b55; border-left: 4px solid #00d2ff; margin-left: 20px; }
        .wizard { background: #1b1b3a; border-left: 4px solid #7f00ff; margin-right: 20px; }
        .system { background: #333; color: #aaa; font-style: italic; text-align: center; font-size: 0.9rem; }
        .error { background: #4a1c1c; color: #ff8888; }
        input, select, button { padding: 12px; border-radius: 5px; border: none; font-size: 1rem; }
        input { background: #16213e; color: white; border: 1px solid #333; width: 60%; }
        button { background: #00d2ff; cursor: pointer; font-weight: bold; transition: opacity 0.3s; }
        button:disabled { background: #444; cursor: not-allowed; opacity: 0.5; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <img id="wizard-img" src="https://api.dicebear.com/7.x/bottts/svg?seed=Novice&backgroundColor=b6e3f4" alt="Wizard">
        <h1>Gandalf's Chamber</h1>
        
        <div style="margin-bottom: 15px;">
            <label>Difficulty: </label>
            <select id="level">
                <option value="1">Level 1: Novice</option>
                <option value="2" id="opt-2" disabled>Level 2: Apprentice (Locked)</option>
                <option value="3" id="opt-3" disabled>Level 3: Archmage (Locked)</option>
            </select>
        </div>

        <div id="chat">
            <div class="msg wizard"><b>Wizard:</b> I guard the ancient passwords. State your business.</div>
        </div>

        <div style="display: flex; gap: 10px; justify-content: center;">
            <input type="text" id="userInput" placeholder="Type your spell..." onkeypress="if(event.key==='Enter') send()">
            <button id="castBtn" onclick="send()">Cast</button>
        </div>
        <p id="server-status" style="font-size: 0.7rem; color: #555; margin-top: 20px;">Connected to Wizard Cloud • Gemini 2.0 Stable</p>
    </div>

    <script>
        const wizardAvatars = {
            1: "https://api.dicebear.com/7.x/bottts/svg?seed=Novice&backgroundColor=b6e3f4",
            2: "https://api.dicebear.com/7.x/adventurer/svg?seed=Apprentice&backgroundColor=ffdfbf",
            3: "https://api.dicebear.com/7.x/avataaars/svg?seed=Archmage&accessories=round&top=winterHat02"
        };

        const levelSelect = document.getElementById('level');
        const castBtn = document.getElementById('castBtn');

        levelSelect.addEventListener('change', () => {
            document.getElementById('wizard-img').src = wizardAvatars[levelSelect.value];
            addMessage("wizard", "New challenger? Prove your worth for this level.");
        });

        function addMessage(sender, text) {
            const chat = document.getElementById('chat');
            const cls = sender === 'you' ? 'user' : (sender === 'system' ? 'system' : 'wizard');
            const label = sender === 'you' ? 'You' : (sender === 'system' ? 'System' : 'Wizard');
            chat.innerHTML += `<div class="msg ${cls}"><b>${label}:</b> ${text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        async function send() {
            const inputEl = document.getElementById('userInput');
            const input = inputEl.value.trim();
            if(!input || castBtn.disabled) return;

            addMessage("you", input);
            inputEl.value = '';
            
            // Cooldown to prevent spamming your API
            castBtn.disabled = true;
            castBtn.innerText = "Chanting...";

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ level: parseInt(levelSelect.value), input: input })
                });

                const data = await response.json();
                
                if (data.image) document.getElementById('wizard-img').src = data.image;
                addMessage("wizard", data.reply);

                // Handle Level Success
                if (data.passed) {
                    handleLevelUp();
                }

            } catch (err) {
                addMessage("error", "The Wizard's connection flickered. Try again!");
            } finally {
                // Re-enable after a short delay
                setTimeout(() => {
                    castBtn.disabled = false;
                    castBtn.innerText = "Cast";
                }, 1000);
            }
        }

        function handleLevelUp() {
            const currentLevel = parseInt(levelSelect.value);
            const nextLevel = currentLevel + 1;

            if (nextLevel <= 3) {
                const nextOpt = document.getElementById(`opt-${nextLevel}`);
                nextOpt.disabled = false;
                nextOpt.innerText = `Level ${nextLevel}: ${nextLevel === 2 ? 'Apprentice' : 'Archmage'}`;
                
                addMessage("system", `✨ LEVEL ${currentLevel} CLEARED! Level ${nextLevel} is now unlocked.`);
                
                // Shake effect on the wizard image
                const img = document.getElementById('wizard-img');
                img.style.transform = "scale(1.2) rotate(10deg)";
                setTimeout(() => img.style.transform = "scale(1)", 500);
            } else {
                addMessage("system", "🏆 THE ARCHMAGE HAS BEEN DEFEATED! You are the Master of Secrets.");
            }
        }
    </script>
</body>
</html>
